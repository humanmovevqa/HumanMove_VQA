### model
model_name_or_path: Qwen/Qwen3-VL-8B-Instruct
trust_remote_code: true
image_max_pixels: 262144
video_max_pixels: 65536  # 256x256 per frame
video_fps: 64.0          # high so we always get video_maxlen frames, uniformly sampled over whole video
video_maxlen: 64
# video_fps: 32.0
# video_maxlen: 32

### method
stage: sft
do_train: true
finetuning_type: lora
freeze_multi_modal_projector: false
lora_rank: 16              # 8=lightweight, 16=good for ~5K, 32=more capacity
lora_alpha: 32             # default 2*rank; effective scale = alpha/rank
lora_dropout: 0.05         # light regularization for 5K samples
lora_target: all

### dataset
dataset_dir: /path/to/sft/dataset/         # directory containing dataset_info.json
dataset: <train_dataset_name>
eval_dataset: <eval_dataset_name>
template: qwen3_vl_nothink
default_system: |
  You are answering multiple-choice questions about a person's motion in a video.

  All motion is described in a fixed world coordinate system defined as follows:
  • Motion is measured relative to the first frame of the video.
  • The vertical axis (Y) points upward from the ground.
  • The horizontal axis (X) points left–right relative to the person in the first frame.
  • The depth axis (Z) points forward–backward relative to the person in the first frame.
  • Turning left or right refers to rotation of the person's body, not camera motion.

  When a question refers to quarters of the video, these are four equal-length temporal segments: the first quarter is the first 25% of the video, the second quarter is 25–50%, and so on.

  Answer each question by selecting the single best option from the provided choices. Respond with the option letter and text.
cutoff_len: 8192
preprocessing_num_workers: 4
dataloader_num_workers: 4

### output
output_dir: /path/to/output/saves/         # where checkpoints and logs are written
logging_steps: 100
report_to: tensorboard
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
learning_rate: 5.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
eval_strategy: steps
eval_steps: 500
per_device_eval_batch_size: 2
